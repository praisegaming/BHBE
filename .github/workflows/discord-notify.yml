name: Notificación Discord PRs

# Trigger: escuchamos varios tipos de evento sobre pull_request
on:
  pull_request:
    types: [opened, closed]
    branches: [main]

jobs:
  notify-discord:
    runs-on: ubuntu-latest

    steps:
      # ── Caso 1: PR recién creada ──
      - name: Notificar PR creada
        if: github.event.action == 'opened'
        env:
          DISCORD_WEBHOOK: ${{ secrets.DISCORD_WEBHOOK }}
          PR_TITLE: ${{ github.event.pull_request.title }}
          PR_AUTHOR: ${{ github.event.pull_request.user.login }}
          PR_URL: ${{ github.event.pull_request.html_url }}
          REPO_NAME: ${{ github.repository }}
        run: |
          curl -H "Content-Type: application/json" \
            -d "{\"content\": \"📝 **Nueva PR en $REPO_NAME**\n**${PR_TITLE}** por \`${PR_AUTHOR}\`\n${PR_URL}\"}" \
            "$DISCORD_WEBHOOK"

      # ── Caso 2: PR mergeada ──
      - name: Notificar merge
        if: github.event.action == 'closed' && github.event.pull_request.merged == true
        env:
          DISCORD_WEBHOOK: ${{ secrets.DISCORD_WEBHOOK }}
          PR_TITLE: ${{ github.event.pull_request.title }}
          PR_AUTHOR: ${{ github.event.pull_request.user.login }}
          PR_URL: ${{ github.event.pull_request.html_url }}
          REPO_NAME: ${{ github.repository }}
        run: |
          curl -H "Content-Type: application/json" \
            -d "{\"content\": \"🔀 **Merge en $REPO_NAME**\n**${PR_TITLE}** por \`${PR_AUTHOR}\`\n${PR_URL}\"}" \
            "$DISCORD_WEBHOOK"

      # ── Caso 3: PR cerrada SIN merge (rechazada) ──
      - name: Notificar PR rechazada
        if: github.event.action == 'closed' && github.event.pull_request.merged == false
        env:
          DISCORD_WEBHOOK: ${{ secrets.DISCORD_WEBHOOK }}
          PR_TITLE: ${{ github.event.pull_request.title }}
          PR_AUTHOR: ${{ github.event.pull_request.user.login }}
          PR_URL: ${{ github.event.pull_request.html_url }}
          REPO_NAME: ${{ github.repository }}
        run: |
          curl -H "Content-Type: application/json" \
            -d "{\"content\": \"❌ **PR cerrada sin merge en $REPO_NAME**\n**${PR_TITLE}** por \`${PR_AUTHOR}\`\n${PR_URL}\"}" \
            "$DISCORD_WEBHOOK"